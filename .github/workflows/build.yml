name: Build ArcBright IDE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Clone VS Code
        run: |
          git clone --depth 1 --branch 1.124.2 https://github.com/microsoft/vscode.git vscode || \
          git clone --depth 1 https://github.com/microsoft/vscode.git vscode && cd vscode && git fetch --depth 1 origin tag 1.124.2 && git checkout 1.124.2
      
      - name: Apply ArcBright patches
        run: |
          cp -r patches/* vscode/
          cd vscode
          rm -rf extensions/copilot
          sed -i '/@github\/copilot/d' package.json remote/package.json 2>/dev/null || true
      
      - name: Build
        run: |
          cd vscode
          npm install
          npx gulp vscode-linux-x64
      
      - name: Package
        run: |
          cd vscode
          tar -czf ../arcbright-ide-linux-x64.tar.gz ../VSCode-linux-x64/
      
      - uses: actions/upload-artifact@v4
        with:
          name: arcbright-ide-linux-x64
          path: arcbright-ide-linux-x64.tar.gz
